<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Premium Sandbox Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Lobster&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000000; color: #ffffff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* Premium Login */
        #login-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; }
        .login-box { background: #121212; border: 1px solid #262626; padding: 40px 30px; width: 90%; max-width: 360px; display: flex; flex-direction: column; text-align: center; border-radius: 12px; }
        .login-box h1 { font-family: 'Lobster', cursive; font-size: 42px; margin-bottom: 30px; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-box input { margin-bottom: 15px; padding: 14px; border: 1px solid #262626; background: #1e1e1e; border-radius: 8px; color: white; font-size: 14px; outline: none; }
        .login-box input:focus { border-color: #555; }
        .login-box button { background: #0095f6; color: white; border: none; padding: 14px; font-weight: 600; border-radius: 8px; cursor: pointer; font-size: 15px; margin-top: 10px; }

        /* App Wrapper */
        .app-shell { width: 100%; max-width: 450px; display: flex; flex-direction: column; min-height: 100vh; background: #000; position: relative; padding-bottom: 70px; border-left: 1px solid #1c1c1e; border-right: 1px solid #1c1c1e; }

        /* Premium Header */
        header { position: sticky; top: 0; background: #000; border-bottom: 1px solid #1c1c1e; display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; z-index: 1000; }
        header h1 { font-family: 'Lobster', cursive; font-size: 26px; cursor: pointer; }
        
        /* Sleek Search Bar */
        .search-container { width: 100%; padding: 10px 15px; background: #000; position: sticky; top: 54px; z-index: 999; display: none; }
        .search-container.show-search { display: block; }
        .search-container input { width: 100%; padding: 10px 12px 10px 38px; border: none; border-radius: 10px; background: #262626; color: white; font-size: 14px; outline: none; }
        .search-inner { position: relative; }
        .search-inner::before { content: '🔍'; position: absolute; left: 12px; top: 9px; font-size: 14px; opacity: 0.6; }

        /* Full-Page Screens Layout */
        .view-page { display: none; width: 100%; padding: 10px 0; animation: fadeIn 0.2s ease-in-out; }
        .view-page.active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Instagram Post Card */
        .card { background: #000; margin-bottom: 15px; width: 100%; border-bottom: 1px solid #1c1c1e; padding-bottom: 10px; }
        .card-header { padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid #cc2366; padding: 1px; }
        .username { font-weight: 600; font-size: 14px; }
        
        .media-holder { width: 100%; background: #050505; overflow: hidden; position: relative; }
        .card-media { width: 100%; display: block; object-fit: cover; }
        .reel-size { height: 500px; width: 100%; background: #000; }
        .post-size { max-height: 450px; }

        .card-actions { padding: 12px 15px 5px 15px; display: flex; gap: 18px; }
        .like-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; transition: transform 0.1s; }
        .like-btn:active { transform: scale(1.2); }
        .liked { color: #ff3040; }
        .details-area { padding: 0 15px; font-size: 14px; }
        .details-area p { margin-bottom: 4px; }
        
        /* Comments System */
        .comment-list { margin-top: 5px; font-size: 13px; color: #a8a8a8; max-height: 75px; overflow-y: auto; }
        .comment-box { display: flex; border-bottom: 1px solid #121212; padding: 5px 15px; margin-top: 5px; }
        .comment-box input { flex: 1; border: none; background: transparent; color: white; font-size: 13px; padding: 8px 0; outline: none; }
        .comment-box button { border: none; background: none; color: #0095f6; font-weight: 600; font-size: 13px; cursor: pointer; }

        /* Search Grid Explore Layout */
        .explore-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; padding: 3px; }
        .explore-item { position: relative; width: 100%; aspect-ratio: 1/1; background: #1c1c1e; overflow: hidden; cursor: pointer; }
        .explore-item img, .explore-item video { width: 100%; height: 100%; object-fit: cover; }
        .explore-badge { position: absolute; top: 8px; right: 8px; font-size: 14px; background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 4px; }

        /* Profile Page Styles */
        .profile-container { padding: 15px; }
        .profile-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 15px; }
        .p-avatar-box { position: relative; width: 86px; height: 86px; }
        .p-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #262626; }
        .change-dp-lbl { position: absolute; bottom: 0; right: 0; background: #0095f6; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; font-weight: bold; border: 2px solid #000; }
        
        .profile-stats { display: flex; gap: 20px; text-align: center; flex: 1; justify-content: space-around; }
        .stat-count { font-weight: 700; font-size: 16px; color: white; }
        .stat-label { font-size: 12px; color: #a8a8a8; }
        .clickable-stat { cursor: pointer; padding: 5px; border-radius: 5px; }
        .clickable-stat:hover { background: #121212; }

        .profile-meta { margin-bottom: 15px; }
        .profile-meta h2 { font-size: 18px; font-weight: 600; margin-bottom: 5px; }
        .edit-profile-btn { background: #1c1c1e; color: white; border: none; padding: 8px 0; width: 100%; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; margin-bottom: 15px; }
        .bio-section { font-size: 13.5px; line-height: 1.4; color: #efefef; }
        
        /* Edit Profile Box */
        #edit-fields-box { display: none; background: #1c1c1e; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        #edit-fields-box input { width: 100%; padding: 10px; background: #000; border: 1px solid #262626; color: white; border-radius: 6px; margin-bottom: 10px; outline: none; }
        #edit-fields-box button { background: #0095f6; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: 600; cursor: pointer; }

        /* Creator Upload Panel via Create Page */
        .upload-panel { background: #1c1c1e; padding: 20px; border-radius: 12px; margin: 15px; border: 1px solid #262626; }
        .upload-panel h3 { font-size: 18px; margin-bottom: 15px; font-weight: 600; text-align: center; }
        .upload-panel select, .upload-panel input, .upload-panel button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-size: 14px; }
        .upload-panel select, .upload-panel input { background: #000; color: white; border: 1px solid #262626; outline: none; }
        .upload-panel button { background: #0095f6; color: white; font-weight: 600; cursor: pointer; margin-top: 10px; }
        
        /* Admin Sandbox Desk */
        .admin-desk { background: #121212; border: 1px dashed #ff3040; border-radius: 12px; padding: 15px; margin-top: 20px; }
        .admin-badge { background: #ff3040; color: white; padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; display: inline-block; margin-bottom: 12px; }
        .queue-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1c1c1e; font-size: 13px; }
        .queue-btn { background: #2fb171; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* Modal Popup System (Followers/Post View) */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 6000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #262626; width: 100%; max-width: 360px; border-radius: 12px; overflow: hidden; animation: zoomIn 0.2s ease; }
        .modal-header { padding: 15px; border-bottom: 1px solid #363636; display: flex; justify-content: space-between; font-weight: 600; }
        .modal-body { max-height: 300px; overflow-y: auto; padding: 10px; }
        .follow-user-row { display: flex; align-items: center; gap: 12px; padding: 10px; border-bottom: 1px solid #323232; }
        .follow-user-row img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Pure Instagram Bottom Nav System */
        nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: #000; border-top: 1px solid #1c1c1e; display: flex; justify-content: space-around; padding: 10px 0; z-index: 2000; }
        .nav-tab { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 50px; height: 45px; }
        .nav-tab svg { width: 24px; height: 24px; fill: #8e8e8e; transition: transform 0.1s; }
        .nav-tab.active-tab svg { fill: #ffffff; }
        .nav-avatar { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; border: 1px solid #8e8e8e; }
        .nav-tab.active-tab .nav-avatar { border-color: #fff; }
        .plus-icon { font-size: 24px; color: #8e8e8e; font-weight: 300; }
        .active-tab .plus-icon { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Login Area -->
    <div id="login-screen">
        <div class="login-box">
            <h1>Instagram</h1>
            <input type="text" id="login-name" placeholder="Username (Thivash to Unlock Admin)">
            <input type="text" id="login-phone" placeholder="Phone / Password">
            <button onclick="authApp()">Log In</button>
        </div>
    </div>

    <!-- Main Shell -->
    <div class="app-shell">
        
        <header>
            <h1 onclick="navigateTo('home')">Instagram</h1>
        </header>

        <!-- Search Bar Section (Only visible inside Search Tab) -->
        <div id="search-bar-block" class="search-container">
            <div class="search-inner">
                <input type="text" id="app-search" placeholder="Search creators, captions, posts..." oninput="triggerSearch()">
            </div>
        </div>

        <!-- Feed Page -->
        <div id="page-home" class="view-page active-page">
            <div id="posts-stream"></div>
        </div>

        <!-- Search / Explore Grid Page -->
        <div id="page-search" class="view-page">
            <div class="explore-grid" id="explore-grid-stream"></div>
        </div>

        <!-- Create Content Pipeline Page -->
        <div id="page-create" class="view-page">
            <div class="upload-panel">
                <h3>Create New Post / Reel</h3>
                <input type="text" id="sim-author" placeholder="Your Creator Handle (eg: ronaldo)">
                <select id="sim-type">
                    <option value="post">Instagram Feed Post 📸</option>
                    <option value="reels">Instagram Video Reel 🎬</option>
                </select>
                <input type="text" id="sim-media" placeholder="Paste Media URL (.mp4 video or Image link)">
                <input type="text" id="sim-caption" placeholder="Write an engaging caption...">
                <button onclick="submitToSandbox()">Submit for Thivash Approval</button>
            </div>
        </div>

        <!-- Profile Page -->
        <div id="page-profile" class="view-page">
            <div class="profile-container">
                <div class="profile-header">
                    <div class="p-avatar-box">
                        <img id="my-profile-pic" class="p-avatar" src="https://picsum.photos/id/64/150/150">
                        <label class="change-dp-lbl" for="dp-file-input">＋</label>
                        <input type="file" id="dp-file-input" accept="image/*" style="display:none;" onchange="updateProfilePicture(this)">
                    </div>
                    <div class="profile-stats">
                        <div>
                            <div class="stat-count" id="post-count-lbl">2</div>
                            <div class="stat-label">posts</div>
                        </div>
                        <div class="clickable-stat" onclick="openFollowersModal()">
                            <div class="stat-count" id="followers-count-lbl">4M</div>
                            <div class="stat-label">followers</div>
                        </div>
                        <div>
                            <div class="stat-count">184</div>
                            <div class="stat-label">following</div>
                        </div>
                    </div>
                </div>

                <div class="profile-meta">
                    <h2 id="my-profile-name">User Account</h2>
                    <div class="bio-section" id="my-profile-status">Premium Active Sandbox Mode</div>
                </div>

                <button class="edit-profile-btn" onclick="toggleEditBox()">Edit Profile</button>
                
                <div id="edit-fields-box">
                    <input type="text" id="edit-name-input" placeholder="Update Display Name...">
                    <button onclick="saveProfileChanges()">Save Changes</button>
                </div>

                <!-- Admin Desktop Setup (Only visible to Thivash Account) -->
                <div id="admin-sandbox-desk" class="admin-desk" style="display:none;">
                    <div class="admin-badge">⚡ Root Control Activated: Thivash Controller</div>
                    <h4 style="font-size:14px; color:#ff3040; margin-bottom:10px;">📥 Incoming Content Verification Box</h4>
                    <div id="queue-list">
                        <p style="color:#555; font-size:12px;">No pending items for validation review.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Navigation Bar System -->
        <nav>
            <button id="tab-home" class="nav-tab active-tab" onclick="navigateTo('home')">
                <svg viewBox="0 0 24 24"><path d="M22 23h-6.001a1 1 0 0 1-1-1v-5.667a1 1 0 0 0-1-1H9.999a1 1 0 0 0-1 1V22a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V9.004a1 1 0 0 1 .381-.785l9.504-7.46a1 1 0 0 1 1.236 0l9.504 7.46A1 1 0 0 1 23 9.004V22a1 1 0 0 1-1 1zM3 10.158V21h3v-5.667a3 3 0 0 1 3-3h4.001a3 3 0 0 1 3 3V21h3V10.158l-7-5.498z"/></svg>
            </button>
            <button id="tab-search" class="nav-tab" onclick="navigateTo('search')">
                <svg viewBox="0 0 24 24"><path d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z"/></svg>
            </button>
            <button id="tab-create" class="nav-tab" onclick="navigateTo('create')">
                <span class="plus-icon">＋</span>
            </button>
            <button id="tab-profile" class="nav-tab" onclick="navigateTo('profile')">
                <img id="nav-avatar-img" class="nav-avatar" src="https://picsum.photos/id/64/50/50">
            </button>
        </nav>

    </div>

    <!-- Followers Modal Element Overlay -->
    <div id="followers-modal" class="modal-overlay" onclick="closeFollowersModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span>Followers List</span>
                <span style="cursor:pointer; color:#ff3040;" onclick="closeFollowersModal()">✕</span>
            </div>
            <div class="modal-body" id="followers-list-container">
                <!-- Javascript fills this -->
            </div>
        </div>
    </div>

    <script>
        const AUTH_NAME = "thivash";

        let sessionUser = "";
        let isRootAdmin = false;
        let activePage = "home";
        let searchString = "";

        // Simulated Followers Data Network matrix
        const mockFollowers = [
            { name: "virat.kohli", img: "https://picsum.photos/id/338/100/100" },
            { name: "anirudh_official", img: "https://picsum.photos/id/445/100/100" },
            { name: "cristiano", img: "https://picsum.photos/id/237/100/100" },
            { name: "leomessi", img: "https://picsum.photos/id/1025/100/100" },
            { name: "kollywood_trends", img: "https://picsum.photos/id/122/100/100" }
        ];

        // Database Engine Layout Array
        let globalDatabase = [
            { id: 1, author: "virat.kohli", avatar: "https://picsum.photos/id/338/100/100", type: "post", media: "https://picsum.photos/600/500", caption: "Match day vibes! Focus on goals 🎯", likes: 2540, liked: false, comments: ["King Kohli!", "Mass bro"] },
            { id: 2, author: "anirudh_official", avatar: "https://picsum.photos/id/445/100/100", type: "reels", media: "https://www.w3schools.com/html/mov_bbb.mp4", caption: "New track sync loop! Full sound up 🎧🔥", likes: 9810, liked: false, comments: ["Rockstar background work!!", "Loop mode enabled"] }
        ];

        let pendingSandbox = [];

        if (!localStorage.getItem("insta_db_pro")) localStorage.setItem("insta_db_pro", JSON.stringify(globalDatabase));
        globalDatabase = JSON.parse(localStorage.getItem("insta_db_pro"));

        function authApp() {
            const name = document.getElementById("login-name").value.trim();
            if(!name) { alert("Please enter a username"); return; }
            sessionUser = name;

            if(name.toLowerCase() === AUTH_NAME) {
                isRootAdmin = true;
                document.getElementById("admin-sandbox-desk").style.display = "block";
            }

            document.getElementById("my-profile-name").innerText = sessionUser;
            document.getElementById("my-profile-status").innerText = isRootAdmin ? "👑 Main Admin Account (Verification Rights Active)" : "Verified Public Account Sandbox Node";
            
            document.getElementById("login-screen").style.display = "none";
            renderEngine();
        }

        function navigateTo(targetPage) {
            activePage = targetPage;
            
            document.getElementById("page-home").classList.toggle("active-page", targetPage === 'home');
            document.getElementById("page-search").classList.toggle("active-page", targetPage === 'search');
            document.getElementById("page-create").classList.toggle("active-page", targetPage === 'create');
            document.getElementById("page-profile").classList.toggle("active-page", targetPage === 'profile');

            document.getElementById("tab-home").classList.toggle("active-tab", targetPage === 'home');
            document.getElementById("tab-search").classList.toggle("active-tab", targetPage === 'search');
            document.getElementById("tab-create").classList.toggle("active-tab", targetPage === 'create');
            document.getElementById("tab-profile").classList.toggle("active-tab", targetPage === 'profile');

            // Toggle Search Panel visibility only during search view
            document.getElementById("search-bar-block").classList.toggle("show-search", targetPage === 'search');

            renderEngine();
        }

        function triggerSearch() {
            searchString = document.getElementById("app-search").value.toLowerCase();
            renderExploreGrid();
        }

        function renderEngine() {
            // Render Main Home feed stream
            if(activePage === 'home') {
                const homeStream = document.getElementById("posts-stream");
                homeStream.innerHTML = "";
                if(globalDatabase.length === 0) homeStream.innerHTML = "<p style='text-align:center; padding:40px; color:#555;'>No posts inside pool</p>";
                globalDatabase.forEach(item => homeStream.appendChild(createCardItem(item)));
            }
            
            // Render Explore Grid system
            if(activePage === 'search') {
                renderExploreGrid();
            }

            // Keep Counters Dynamic
            document.getElementById("post-count-lbl").innerText = globalDatabase.length;

            if(isRootAdmin) renderSandboxQueue();
        }

        function renderExploreGrid() {
            const gridStream = document.getElementById("explore-grid-stream");
            gridStream.innerHTML = "";

            // Filter content logic for comprehensive Search
            const filteredData = globalDatabase.filter(item => 
                item.author.toLowerCase().includes(searchString) || 
                item.caption.toLowerCase().includes(searchString) ||
                item.type.toLowerCase().includes(searchString)
            );

            if(filteredData.length === 0) {
                gridStream.innerHTML = "<p style='grid-column: span 3; text-align:center; padding:40px; color:#555;'>No matched results found</p>";
                return;
            }

            filteredData.forEach(item => {
                const block = document.createElement("div");
                block.className = "explore-item";
                block.onclick = () => { navigateTo('home'); };

                let indicator = item.type === "reels" ? "🎬" : "📸";
                
                if (item.media.endsWith(".mp4") || item.type === "reels") {
                    block.innerHTML = `<span class="explore-badge">${indicator}</span><video src="${item.media}" muted loop autoplay></video>`;
                } else {
                    block.innerHTML = `<span class="explore-badge">${indicator}</span><img src="${item.media}">`;
                }
                gridStream.appendChild(block);
            });
        }

        function createCardItem(item) {
            const card = document.createElement("div");
            card.className = "card";

            let mediaTag = "";
            if (item.media.endsWith(".mp4") || item.type === "reels" || item.media.includes("video")) {
                mediaTag = `<video class="card-media reel-size" src="${item.media}" controls autoplay loop muted></video>`;
            } else {
                mediaTag = `<img class="card-media post-size" src="${item.media}">`;
            }

            let commentsHtml = item.comments.map(c => `<p style='margin-top:2px;'><span style='font-weight:600; color:#fff;'>Viewer:</span> ${c}</p>`).join("");

            card.innerHTML = `
                <div class="card-header">
                    <div class="user-info">
                        <img class="avatar" src="${item.avatar || 'https://picsum.photos/100/100'}">
                        <span class="username">${item.author}</span>
                    </div>
                    <span style="font-size:12px; opacity:0.4;">⋮</span>
                </div>
                <div class="media-holder">${mediaTag}</div>
                <div class="card-actions">
                    <button class="like-btn ${item.liked ? 'liked' : ''}" onclick="toggleLikeLink(${item.id})">${item.liked ? '❤️' : '🤍'}</button>
                </div>
                <div class="details-area">
                    <p style="font-weight:700;">${item.likes} likes</p>
                    <p><span class="username" style="margin-right:6px;">${item.author}</span>${item.caption}</p>
                    <div class="comment-list">${commentsHtml}</div>
                </div>
                <div class="comment-box">
                    <input type="text" id="comm-in-${item.id}" placeholder="Add comment to @${item.author}...">
                    <button onclick="commitComment(${item.id})">Post</button>
                </div>
            `;
            return card;
        }

        function toggleLikeLink(id) {
            globalDatabase = globalDatabase.map(p => {
                if(p.id === id) { p.liked = !p.liked; p.likes = p.liked ? p.likes + 1 : p.likes - 1; }
                return p;
            });
            syncState();
        }

        function commitComment(id) {
            const input = document.getElementById(`comm-in-${id}`);
            if(!input.value.trim()) return;
            globalDatabase = globalDatabase.map(p => {
                if(p.id === id) p.comments.push(`${sessionUser}: ${input.value.trim()}`);
                return p;
            });
            syncState();
            input.value = "";
        }

        // Profile Utilities
        function toggleEditBox() {
            const box = document.getElementById("edit-fields-box");
            box.style.display = (box.style.display === "block") ? "none" : "block";
        }

        function saveProfileChanges() {
            const newName = document.getElementById("edit-name-input").value.trim();
            if(newName) {
                sessionUser = newName;
                document.getElementById("my-profile-name").innerText = sessionUser;
                alert("Profile metrics updated!");
            }
            toggleEditBox();
        }

        function updateProfilePicture(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById("my-profile-pic").src = e.target.result;
                    document.getElementById("nav-avatar-img").src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Followers Popup Window Logic Engine
        function openFollowersModal() {
            const container = document.getElementById("followers-list-container");
            container.innerHTML = "";
            
            mockFollowers.forEach(f => {
                const row = document.createElement("div");
                row.className = "follow-user-row";
                row.innerHTML = `
                    <img src="${f.img}">
                    <div>
                        <div style="font-weight:600; font-size:14px;">${f.name}</div>
                        <div style="font-size:11px; color:#a8a8a8;">Followed you instantly</div>
                    </div>
                `;
                container.appendChild(row);
            });
            document.getElementById("followers-modal").style.display = "flex";
        }

        function closeFollowersModal() {
            document.getElementById("followers-modal").style.display = "none";
        }

        // Content Sandbox Operations
        function submitToSandbox() {
            const author = document.getElementById("sim-author").value.trim() || "anonymous_user";
            const type = document.getElementById("sim-type").value;
            const media = document.getElementById("sim-media").value.trim();
            const caption = document.getElementById("sim-caption").value.trim();

            if(!media || !caption) { alert("Missing media url paths or caption text details!"); return; }

            const item = {
                id: Date.now(),
                author: author.toLowerCase(),
                avatar: "https://picsum.photos/100/100",
                type: type,
                media: media,
                caption: caption,
                likes: 0,
                liked: false,
                comments: []
            };

            pendingSandbox.push(item);
            alert("Sent! Waiting for Admin Thivash validation approval.");
            
            document.getElementById("sim-author").value = "";
            document.getElementById("sim-media").value = "";
            document.getElementById("sim-caption").value = "";

            navigateTo('home');
        }

        function renderSandboxQueue() {
            const qList = document.getElementById("queue-list");
            qList.innerHTML = "";

            if(pendingSandbox.length === 0) {
                qList.innerHTML = "<p style='color:#555; font-size:12px;'>No pending items in pool loop.</p>";
                return;
            }

            pendingSandbox.forEach((item, index) => {
                const row = document.createElement("div");
                row.className = "queue-item";
                row.innerHTML = `
                    <span>[${item.type.toUpperCase()}] @${item.author}</span>
                    <button class="queue-btn" onclick="approveSandboxItem(${index})">Accept ✔</button>
                `;
                qList.appendChild(row);
            });
        }

        function approveSandboxItem(index) {
            const item = pendingSandbox[index];
            globalDatabase.unshift(item);
            pendingSandbox.splice(index, 1);
            
            syncState();
            alert(`Authorized! Posted onto live segment layouts.`);
        }

        function syncState() {
            localStorage.setItem("insta_db_pro", JSON.stringify(globalDatabase));
            renderEngine();
        }
    </script>
</body>
</html>
